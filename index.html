<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Donkey Clicker 🫏</title>
  <link rel="stylesheet" href="style.css?v=1.21">
</head>
<body>

  <div class="top-controls">
    <button id="resetBtn" onclick="resetGame()">Reset</button>
    <button id="themeToggle" onclick="toggleTheme()">🌙</button>
  </div>

  <div class="layout">

    <div class="side-panel left-panel">
      <h2>Upgrades</h2>
      <div id="upgradeShop"></div>
    </div>

    <div class="main-area">
      <h1>Donkey Clicker 🫏</h1>
      <div class="progress-container">
					<div class="progress-bar-wrapper left">
						  <div id="manualProgress" class="progress-fill manual"></div>
						  <span class="progress-label">UPGRADES</span>
					</div>
					<div class="progress-bar-wrapper right">
						  <div id="autoProgress" class="progress-fill auto"></div>
						  <span class="progress-label">AUTOS</span>
					</div>
			</div>

      <div class="donkey-wrapper">
        <img src="pics/donkey.png" id="donkey" draggable="false">
        <div id="floating"></div>
      </div>

      <h2 id="clicks">0</h2>
      <p class="manual-counter">Manual: <span id="perClick">1</span></p>
      <p class="auto-counter">Auto: <span id="cps">0</span>/s</p>
      <p id="eventTimer" style="font-weight: bold; color: gold;"></p>
    </div>

    <div class="side-panel right-panel">
      <h2>Auto Farmers</h2>
      <div id="autoShop"></div>
    </div>

  </div>

  <footer>made by Kris</footer>

  <script src="script.js?v=1.21"></script>
</body>
</html>
