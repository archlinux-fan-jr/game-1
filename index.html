<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Donkey Clicker Deluxe 🫏</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<button id="themeToggle" onclick="toggleTheme()">🌙</button>

<div class="layout">

  <!-- LEFT -->
  <div class="left">
    <h1>Donkey Clicker 🫏</h1>

    <div class="donkey-wrapper">
      <img src="donkey.png" id="donkey" onclick="clickDonkey()">
      <div id="floating"></div>
    </div>

    <h2><span id="clicks">0</span></h2>
    <p>Manual: <span id="perClick">1</span></p>
    <p>Auto: <span id="cps">0</span>/s</p>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <h2>Upgrades</h2>
    <div id="shop"></div>
  </div>

</div>

<script>
let clicks = 0;
let perClick = 1;
let cps = 0;

let autoLevel = 0;
let autoCost = 10;
let maxAuto = 1000;

let upgrades = [
  {name:"Stronger Click", desc:"x2 manual clicks", cost:100, bought:false},
  {name:"Mega Click", desc:"x3 manual clicks", cost:500, bought:false},
  {name:"Auto Multiplier", desc:"x2 auto income", cost:1000, bought:false}
];

function format(n){
  if(n>=1e12) return (n/1e12).toFixed(2)+"T";
  if(n>=1e9) return (n/1e9).toFixed(2)+"B";
  if(n>=1e6) return (n/1e6).toFixed(2)+"M";
  if(n>=1e3) return (n/1e3).toFixed(2)+"K";
  return Math.floor(n);
}

function clickDonkey(){
  clicks += perClick;
  if(clicks>1e12) clicks=1e12;
  spawnFloating(`+${format(perClick)}`);
  update();
}

function buyAuto(){
  if(autoLevel>=maxAuto) return;
  if(clicks>=autoCost){
    clicks-=autoCost;
    autoLevel++;
    cps += 0.10;
    autoCost = Math.floor(autoCost*1.2);
    update();
  }
}

function buyUpgrade(i){
  let u = upgrades[i];
  if(u.bought) return;
  if(clicks>=u.cost){
    clicks-=u.cost;
    u.bought=true;

    if(i===0) perClick*=2;
    if(i===1) perClick*=3;
    if(i===2) cps*=2;

    update();
  }
}

function spawnFloating(text){
  let el=document.createElement("div");
  el.className="float";
  el.innerText=text;
  document.getElementById("floating").appendChild(el);
  setTimeout(()=>el.remove(),1000);
}

function update(){
  document.getElementById("clicks").innerText=format(clicks);
  document.getElementById("perClick").innerText=format(perClick);
  document.getElementById("cps").innerText=format(cps);

  let shop=document.getElementById("shop");
  shop.innerHTML="";

  // auto clicker card
  let auto=document.createElement("div");
  auto.className="upgrade";
  auto.onclick=buyAuto;
  auto.innerHTML=`<div><strong>Auto Donkey</strong><br>0.10/sec (lvl ${autoLevel}/${maxAuto})</div><div>${format(autoCost)}</div>`;
  shop.appendChild(auto);

  upgrades.forEach((u,i)=>{
    if(!u.bought){
      let div=document.createElement("div");
      div.className="upgrade";
      div.onclick=()=>buyUpgrade(i);
      div.innerHTML=`<div><strong>${u.name}</strong><br>${u.desc}</div><div>${format(u.cost)}</div>`;
      shop.appendChild(div);
    }
  });

  save();
}

setInterval(()=>{
  clicks+=cps;
  if(clicks>1e12) clicks=1e12;
  update();
},1000);

// SAVE SYSTEM
function save(){
  localStorage.setItem("donkeySave", JSON.stringify({clicks,perClick,cps,autoLevel,autoCost,upgrades}));
}

function load(){
  let data=JSON.parse(localStorage.getItem("donkeySave"));
  if(data){
    clicks=data.clicks;
    perClick=data.perClick;
    cps=data.cps;
    autoLevel=data.autoLevel;
    autoCost=data.autoCost;
    upgrades=data.upgrades;
  }
}

// THEME
function toggleTheme(){
  document.body.classList.toggle("light");
}

load();
update();
</script>

</body>
</html>
