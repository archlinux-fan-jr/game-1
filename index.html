<script>
let clicks = 0;
let perClick = 1;
let cps = 0;

let autoMultiplier = 1;
let tempBoost = 1;

// DONKEY RAIN TIMER
let rainActive = false;

setInterval(()=>{
  activateRain();
}, 1200000); // 20 min

function activateRain(){
  rainActive = true;
  tempBoost = 3;
  updateCPS();

  setTimeout(()=>{
    rainActive = false;
    tempBoost = 1;
    updateCPS();
  }, 120000); // 2 min
}

// AUTO FARMERS (EXPANDED)
let autos = [
  {name:"Baby Donkey", base:0.1, cost:10, level:0, unlock:0},
  {name:"Farm Donkey", base:1, cost:100, level:0, unlock:50},
  {name:"Factory Donkey", base:5, cost:500, level:0, unlock:200},
  {name:"Mega Donkey", base:20, cost:2000, level:0, unlock:1000},
  {name:"Ultra Donkey", base:100, cost:10000, level:0, unlock:5000},
  {name:"God Donkey", base:500, cost:50000, level:0, unlock:20000},
  {name:"Galactic Donkey", base:2000, cost:1000000, level:0, unlock:200000},
  {name:"Quantum Donkey", base:10000, cost:50000000, level:0, unlock:10000000},
  {name:"Multiverse Donkey", base:50000, cost:10000000000, level:0, unlock:1000000000}
];

// UPGRADES
let upgrades = [
  {name:"Double Click", desc:"x2 manual", cost:200, bought:false},
  {name:"Triple Click", desc:"x3 manual", cost:1000, bought:false},
  {name:"Auto Boost", desc:"x2 auto", cost:5000, bought:false},
  {name:"Mega Boost", desc:"x5 auto", cost:50000, bought:false}
];

function format(n){
  if(n>=1e12) return (n/1e12).toFixed(2)+"T";
  if(n>=1e9) return (n/1e9).toFixed(2)+"B";
  if(n>=1e6) return (n/1e6).toFixed(2)+"M";
  if(n>=1e3) return (n/1e3).toFixed(2)+"K";
  return Math.floor(n);
}

function clickDonkey(){
  clicks += perClick;
  spawnFloating(`+${format(perClick)}`);
  update();
}

function buyAuto(i){
  let a = autos[i];
  if(clicks>=a.cost){
    clicks -= a.cost;
    a.level++;
    a.cost = Math.floor(a.cost*1.2);
    updateCPS();
    update();
  }
}

function updateCPS(){
  cps = 0;
  autos.forEach(a=>{
    cps += a.level * a.base;
  });
  cps *= autoMultiplier * tempBoost;
}

function buyUpgrade(i){
  let u = upgrades[i];
  if(u.bought) return;
  if(clicks>=u.cost){
    clicks -= u.cost;
    u.bought = true;

    if(i===0) perClick *= 2;
    if(i===1) perClick *= 3;
    if(i===2) autoMultiplier *= 2;
    if(i===3) autoMultiplier *= 5;

    updateCPS();
    update();
  }
}

function spawnFloating(text){
  let el=document.createElement("div");
  el.className="float";
  el.innerText=text;
  document.getElementById("floating").appendChild(el);
  setTimeout(()=>el.remove(),1000);
}

function update(){
  document.getElementById("clicks").innerText=format(clicks);
  document.getElementById("perClick").innerText=format(perClick);
  document.getElementById("cps").innerText=format(cps);

  let autoShop = document.getElementById("autoShop");
  autoShop.innerHTML="";

  autos.forEach((a,i)=>{
    if(clicks >= a.unlock){
      let div=document.createElement("div");
      div.className="upgrade";
      div.onclick=()=>buyAuto(i);
      div.innerHTML=`
        <div>
          <strong>${a.name}</strong><br>
          ${a.base}/s each (lvl ${a.level})
        </div>
        <div>${format(a.cost)}</div>
      `;
      autoShop.appendChild(div);
    }
  });

  let upgradeShop = document.getElementById("upgradeShop");
  upgradeShop.innerHTML="";

  upgrades.forEach((u,i)=>{
    if(!u.bought){
      let div=document.createElement("div");
      div.className="upgrade";
      div.onclick=()=>buyUpgrade(i);
      div.innerHTML=`
        <div><strong>${u.name}</strong><br>${u.desc}</div>
        <div>${format(u.cost)}</div>
      `;
      upgradeShop.appendChild(div);
    }
  });

  save();
}

setInterval(()=>{
  clicks += cps;
  update();
},1000);

// SAVE
function save(){
  localStorage.setItem("donkeySave", JSON.stringify({clicks,perClick,autos,upgrades,autoMultiplier}));
}

function load(){
  let data=JSON.parse(localStorage.getItem("donkeySave"));
  if(data){
    clicks=data.clicks||0;
    perClick=data.perClick||1;
    autos=data.autos||autos;
    upgrades=data.upgrades||upgrades;
    autoMultiplier=data.autoMultiplier||1;
  }
  updateCPS();
}

function resetGame(){
  localStorage.clear();
  location.reload();
}

function toggleTheme(){
  document.body.classList.toggle("light");
}

load();
update();
</script>
