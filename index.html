<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Donkey Clicker Deluxe 🫏</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<button id="themeToggle" onclick="toggleTheme()">🌙</button>

<div class="layout">

  <!-- LEFT -->
  <div class="left">
    <h1>Donkey Clicker 🫏</h1>

    <div class="donkey-wrapper">
      <img src="donkey.png" id="donkey" onclick="clickDonkey()">
      <div id="floating"></div>
    </div>

    <h2><span id="clicks">0</span></h2>
    <p>Manual: <span id="perClick">1</span></p>
    <p>Auto: <span id="cps">0</span>/s</p>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <h2>Auto Farmers</h2>
    <div id="autoShop"></div>

    <h2>Upgrades</h2>
    <div id="upgradeShop"></div>
  </div>

</div>

<script>
let clicks = 0;
let perClick = 1;
let cps = 0;

// AUTO FARMERS
let autos = [
  {name:"Baby Donkey", base:0.1, cost:10, level:0, unlock:0},
  {name:"Farm Donkey", base:1, cost:100, level:0, unlock:50},
  {name:"Factory Donkey", base:5, cost:500, level:0, unlock:200},
  {name:"Mega Donkey", base:20, cost:2000, level:0, unlock:1000}
];

// UPGRADES (one-time)
let upgrades = [
  {name:"Double Click", desc:"x2 manual", cost:200, bought:false},
  {name:"Triple Click", desc:"x3 manual", cost:1000, bought:false},
  {name:"Auto Boost", desc:"x2 all auto", cost:5000, bought:false}
];

let autoMultiplier = 1;

function format(n){
  if(n>=1e12) return (n/1e12).toFixed(2)+"T";
  if(n>=1e9) return (n/1e9).toFixed(2)+"B";
  if(n>=1e6) return (n/1e6).toFixed(2)+"M";
  if(n>=1e3) return (n/1e3).toFixed(2)+"K";
  return Math.floor(n);
}

function clickDonkey(){
  clicks += perClick;
  if(clicks>1e12) clicks=1e12;
  spawnFloating(`+${format(perClick)}`);
  update();
}

function buyAuto(i){
  let a = autos[i];
  if(clicks>=a.cost){
    clicks -= a.cost;
    a.level++;
    a.cost = Math.floor(a.cost*1.2);
    updateCPS();
    update();
  }
}

function updateCPS(){
  cps = 0;
  autos.forEach(a=>{
    cps += a.level * a.base;
  });
  cps *= autoMultiplier;
}

function buyUpgrade(i){
  let u = upgrades[i];
  if(u.bought) return;
  if(clicks>=u.cost){
    clicks -= u.cost;
    u.bought = true;

    if(i===0) perClick *= 2;
    if(i===1) perClick *= 3;
    if(i===2) autoMultiplier *= 2;

    updateCPS();
    update();
  }
}

function spawnFloating(text){
  let el=document.createElement("div");
  el.className="float";
  el.innerText=text;
  document.getElementById("floating").appendChild(el);
  setTimeout(()=>el.remove(),1000);
}

function update(){
  document.getElementById("clicks").innerText=format(clicks);
  document.getElementById("perClick").innerText=format(perClick);
  document.getElementById("cps").innerText=format(cps);

  // AUTO SHOP
  let autoShop = document.getElementById("autoShop");
  autoShop.innerHTML="";

  autos.forEach((a,i)=>{
    if(clicks>=a.unlock){
      let div=document.createElement("div");
      div.className="upgrade";
      div.onclick=()=>buyAuto(i);
      div.innerHTML=`
        <div>
          <strong>${a.name}</strong><br>
          ${a.base}/s each (lvl ${a.level})
        </div>
        <div>${format(a.cost)}</div>
      `;
      autoShop.appendChild(div);
    }
  });

  // UPGRADE SHOP
  let upgradeShop = document.getElementById("upgradeShop");
  upgradeShop.innerHTML="";

  upgrades.forEach((u,i)=>{
    if(!u.bought){
      let div=document.createElement("div");
      div.className="upgrade";
      div.onclick=()=>buyUpgrade(i);
      div.innerHTML=`
        <div><strong>${u.name}</strong><br>${u.desc}</div>
        <div>${format(u.cost)}</div>
      `;
      upgradeShop.appendChild(div);
    }
  });

  save();
}

setInterval(()=>{
  clicks += cps;
  if(clicks>1e12) clicks=1e12;
  update();
},1000);

// SAVE
function save(){
  localStorage.setItem("donkeySave", JSON.stringify({clicks,perClick,autos,upgrades,autoMultiplier}));
}

function load(){
  let data=JSON.parse(localStorage.getItem("donkeySave"));
  if(data){
    clicks=data.clicks;
    perClick=data.perClick;
    autos=data.autos;
    upgrades=data.upgrades;
    autoMultiplier=data.autoMultiplier || 1;
  }
  updateCPS();
}

// THEME
function toggleTheme(){
  document.body.classList.toggle("light");
}

load();
update();
</script>

</body>
</html>
